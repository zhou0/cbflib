# Cbflib Workflow Ci Build Failure Fix

## Action

Follow the ci-build-failure-fix workflow:
1. Identify cause of CI build failure (e.g., deprecated function, missing library, optional toolchain component).
2. Update source code to replace deprecated or problematic functions (e.g., mktemp → mkstemp in examples/convert_image.c).
3. Modify CMakeLists.txt to adjust build options, add or remove dependencies, and make components optional as needed.
4. Explicitly link required libraries (e.g., libm) in CMakeLists.txt to resolve linkage errors.
5. Update CI workflow files (e.g., .github/workflows/cmake-multi-platform.yml) to ensure required tools are installed on all platforms.
6. Remove obsolete or deprecated build artifacts (e.g., Makefile_old).

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: CMakeLists.txt, examples/convert_image.c, .github/workflows/cmake-multi-platform.yml

